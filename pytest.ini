[pytest]
testpaths = tests
asyncio_mode = auto

markers =
    offline: Tests that run without any external API calls (no Gemini, no Finnhub). Included in CI.
    live: Tests that make real API calls (Gemini + Finnhub). Run manually, never in CI.

addopts = -v --tb=short

filterwarnings =
    ignore::DeprecationWarning:langgraph.*
    ignore::DeprecationWarning:langchain.*
    ignore::DeprecationWarning:google.*
    ignore::PendingDeprecationWarning:langgraph.*
    ignore::pytest.PytestRemovedIn9Warning
